services:
  wimifarma-com-db:
    image: mysql:8.0
    container_name: wimifarma-com-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wimifarma_dev_root}
      MYSQL_DATABASE: wimifarma_wp
      MYSQL_USER: wimifarma_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
    volumes:
      - ./mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - wimifarma-com-network

  wimifarma-com-web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: wimifarma-com-web
    restart: unless-stopped
    depends_on:
      - wimifarma-com-db
      - wimifarma-cotacao-app
      - wimifarma-gestao-app
      - wimifarma-pedidos-app
      - wimifarma-miauw-agent
      - wimifarma-miauw-whatsapp
    environment:
      WIMIFARMA_DB_HOST: wimifarma-com-db
      WIMIFARMA_DB_USER: wimifarma_user
      WIMIFARMA_DB_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
      WIMIFARMA_WP_DB_NAME: wimifarma_wp
      WIMIFARMA_APP_DB_NAME: wimifarma_app
      WP_CACHE: ${WP_CACHE:-}
      MIAUW_OPENAI_API_KEY: ${MIAUW_OPENAI_API_KEY:-}
      MIAUW_OPENAI_MODEL: ${MIAUW_OPENAI_MODEL:-gpt-5.4-mini}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      MIAUW_AGENT_INTERNAL_TOKEN: ${MIAUW_AGENT_INTERNAL_TOKEN:-}
      MIAUW_AGENT_INTERNAL_BASE_URL: ${MIAUW_AGENT_INTERNAL_BASE_URL:-http://wimifarma-miauw-agent:3100/miauw/agent}
      MIAUW_AGENT_SHADOW_ON_SEND: ${MIAUW_AGENT_SHADOW_ON_SEND:-false}
      MIAUW_AGENT_SHADOW_TIMEOUT_MS: ${MIAUW_AGENT_SHADOW_TIMEOUT_MS:-12000}
      MIAUW_ENGINE: ${MIAUW_ENGINE:-php}
      MIAUW_AGENT_ENGINE_ALLOWED_USERS: ${MIAUW_AGENT_ENGINE_ALLOWED_USERS:-adm}
      MIAUW_MAINTENANCE_MODE: ${MIAUW_MAINTENANCE_MODE:-false}
      MIAUW_MAINTENANCE_ALLOWED_USERS: ${MIAUW_MAINTENANCE_ALLOWED_USERS:-adm}
      MIAUW_MAINTENANCE_MESSAGE: ${MIAUW_MAINTENANCE_MESSAGE:-}
      MIAUW_VOICE_PROFILE: ${MIAUW_VOICE_PROFILE:-miauby_padrao}
      MIAUW_AUDIO_ENABLED: ${MIAUW_AUDIO_ENABLED:-true}
      MIAUW_TRANSCRIPTION_MODEL: ${MIAUW_TRANSCRIPTION_MODEL:-gpt-4o-transcribe}
      MIAUW_SPEECH_MODEL: ${MIAUW_SPEECH_MODEL:-gpt-4o-mini-tts}
      MIAUW_SPEECH_VOICE: ${MIAUW_SPEECH_VOICE:-marin}
      MIAUW_REALTIME_MODEL: ${MIAUW_REALTIME_MODEL:-gpt-realtime}
      MIAUW_REALTIME_VOICE: ${MIAUW_REALTIME_VOICE:-marin}
      MIAUW_WHATSAPP_ENABLED: ${MIAUW_WHATSAPP_ENABLED:-false}
      COTACAO_INTERNAL_TOKEN: ${COTACAO_INTERNAL_TOKEN:-}
      COTACAO_INTERNAL_BASE_URL: ${COTACAO_INTERNAL_BASE_URL:-http://wimifarma-cotacao-app:3000/cotacao}
      GESTAO_INTERNAL_TOKEN: ${GESTAO_INTERNAL_TOKEN:-}
      GESTAO_INTERNAL_BASE_URL: ${GESTAO_INTERNAL_BASE_URL:-http://wimifarma-gestao-app:3200/gestao}
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./site:/var/www/html
    networks:
      - wimifarma-com-network

  wimifarma-cotacao-db:
    image: postgres:17-alpine
    container_name: wimifarma-cotacao-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wimifarma_cotacao
      POSTGRES_USER: wimifarma_cotacao
      POSTGRES_PASSWORD: ${COTACAO_POSTGRES_PASSWORD:-wimifarma_cotacao_dev_pass}
    volumes:
      - ./cotacao-data/postgres:/var/lib/postgresql/data
    networks:
      - wimifarma-com-network

  wimifarma-cotacao-redis:
    image: redis:7-alpine
    container_name: wimifarma-cotacao-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./cotacao-data/redis:/data
    networks:
      - wimifarma-com-network

  wimifarma-gestao-db:
    image: postgres:17-alpine
    container_name: wimifarma-gestao-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wimifarma_gestao
      POSTGRES_USER: wimifarma_gestao
      POSTGRES_PASSWORD: ${GESTAO_POSTGRES_PASSWORD:-wimifarma_gestao_dev_pass}
    volumes:
      - ./gestao-data/postgres:/var/lib/postgresql/data
    networks:
      - wimifarma-com-network

  wimifarma-miauw-whatsapp-db:
    image: postgres:17-alpine
    container_name: wimifarma-miauw-whatsapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wimifarma_miauw_whatsapp
      POSTGRES_USER: wimifarma_miauw_whatsapp
      POSTGRES_PASSWORD: ${MIAUW_WHATSAPP_POSTGRES_PASSWORD:-wimifarma_miauw_whatsapp_dev_pass}
    volumes:
      - ./miauw-whatsapp-data/postgres:/var/lib/postgresql/data
    networks:
      - wimifarma-com-network

  wimifarma-gestao-app:
    build:
      context: ./apps/gestao
      dockerfile: Dockerfile
    container_name: wimifarma-gestao-app
    restart: unless-stopped
    depends_on:
      - wimifarma-com-db
      - wimifarma-gestao-db
    environment:
      NODE_ENV: production
      PORT: 3200
      BASE_PATH: /gestao
      MYSQL_HOST: wimifarma-com-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: wimifarma_app
      MYSQL_USER: wimifarma_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
      POSTGRES_HOST: wimifarma-gestao-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wimifarma_gestao
      POSTGRES_USER: wimifarma_gestao
      POSTGRES_PASSWORD: ${GESTAO_POSTGRES_PASSWORD:-wimifarma_gestao_dev_pass}
      GESTAO_SESSION_SECRET: ${GESTAO_SESSION_SECRET:-wimifarma_gestao_dev_secret_change_me}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      GESTAO_INTERNAL_TOKEN: ${GESTAO_INTERNAL_TOKEN:-}
    networks:
      - wimifarma-com-network

  wimifarma-pedidos-app:
    build:
      context: ./apps/pedidos
      dockerfile: Dockerfile
    container_name: wimifarma-pedidos-app
    restart: unless-stopped
    depends_on:
      - wimifarma-com-db
      - wimifarma-gestao-db
    environment:
      NODE_ENV: production
      PORT: 3300
      BASE_PATH: /pedidos
      MYSQL_HOST: wimifarma-com-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: wimifarma_app
      MYSQL_USER: wimifarma_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
      POSTGRES_HOST: wimifarma-gestao-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wimifarma_gestao
      POSTGRES_USER: wimifarma_gestao
      POSTGRES_PASSWORD: ${GESTAO_POSTGRES_PASSWORD:-wimifarma_gestao_dev_pass}
      PEDIDOS_SESSION_SECRET: ${PEDIDOS_SESSION_SECRET:-wimifarma_pedidos_dev_secret_change_me}
      GESTAO_SESSION_SECRET: ${GESTAO_SESSION_SECRET:-wimifarma_gestao_dev_secret_change_me}
    networks:
      - wimifarma-com-network

  wimifarma-cotacao-app:
    build:
      context: ./apps/cotacao
      dockerfile: Dockerfile
    container_name: wimifarma-cotacao-app
    restart: unless-stopped
    depends_on:
      - wimifarma-com-db
      - wimifarma-cotacao-db
      - wimifarma-cotacao-redis
    environment:
      NODE_ENV: production
      PORT: 3000
      BASE_PATH: /cotacao
      MYSQL_HOST: wimifarma-com-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: wimifarma_app
      MYSQL_USER: wimifarma_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
      POSTGRES_HOST: wimifarma-cotacao-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wimifarma_cotacao
      POSTGRES_USER: wimifarma_cotacao
      POSTGRES_PASSWORD: ${COTACAO_POSTGRES_PASSWORD:-wimifarma_cotacao_dev_pass}
      REDIS_URL: redis://wimifarma-cotacao-redis:6379
      SESSION_SECRET: ${COTACAO_SESSION_SECRET:-wimifarma_cotacao_dev_secret_change_me}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      COTACAO_INTERNAL_TOKEN: ${COTACAO_INTERNAL_TOKEN:-}
      COTACAO_BACKUP_DIR: /app/backups
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      GOOGLE_SHEETS_RANGE: ${GOOGLE_SHEETS_RANGE:-Cotacao!A1:Z500}
      GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: ${GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE: ${GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE:-}
    volumes:
      - ./cotacao-data/backups:/app/backups
    networks:
      - wimifarma-com-network

  wimifarma-miauw-agent:
    build:
      context: ./apps/miauw-agent
      dockerfile: Dockerfile
    container_name: wimifarma-miauw-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3100
      MIAUW_AGENT_BASE_PATH: /miauw/agent
      MIAUW_OPENAI_API_KEY: ${MIAUW_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${MIAUW_OPENAI_API_KEY:-}
      MIAUW_OPENAI_MODEL: ${MIAUW_OPENAI_MODEL:-gpt-5.4-mini}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      MIAUW_AGENT_INTERNAL_TOKEN: ${MIAUW_AGENT_INTERNAL_TOKEN:-}
      MIAUW_PHP_TOOL_BRIDGE_URL: ${MIAUW_PHP_TOOL_BRIDGE_URL:-http://wimifarma-com-web/miauw/agent-tools.php}
      MIAUW_VOICE_PROFILE: ${MIAUW_VOICE_PROFILE:-miauby_padrao}
      MIAUW_AUDIO_ENABLED: ${MIAUW_AUDIO_ENABLED:-true}
      MIAUW_TRANSCRIPTION_MODEL: ${MIAUW_TRANSCRIPTION_MODEL:-gpt-4o-transcribe}
      MIAUW_REALTIME_MODEL: ${MIAUW_REALTIME_MODEL:-gpt-realtime}
      MIAUW_REALTIME_VOICE: ${MIAUW_REALTIME_VOICE:-marin}
    networks:
      - wimifarma-com-network

  wimifarma-miauw-whatsapp:
    build:
      context: ./apps/miauw-whatsapp
      dockerfile: Dockerfile
    container_name: wimifarma-miauw-whatsapp
    restart: unless-stopped
    depends_on:
      - wimifarma-miauw-whatsapp-db
      - wimifarma-miauw-agent
    environment:
      NODE_ENV: production
      PORT: 3400
      BASE_PATH: /miauw/whatsapp
      POSTGRES_HOST: wimifarma-miauw-whatsapp-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wimifarma_miauw_whatsapp
      POSTGRES_USER: wimifarma_miauw_whatsapp
      POSTGRES_PASSWORD: ${MIAUW_WHATSAPP_POSTGRES_PASSWORD:-wimifarma_miauw_whatsapp_dev_pass}
      MIAUW_WHATSAPP_ENABLED: ${MIAUW_WHATSAPP_ENABLED:-false}
      MIAUW_WHATSAPP_WEBHOOK_TOKEN: ${MIAUW_WHATSAPP_WEBHOOK_TOKEN:-}
      MIAUW_WHATSAPP_INTERNAL_TOKEN: ${MIAUW_WHATSAPP_INTERNAL_TOKEN:-}
      MIAUW_WHATSAPP_ENCRYPTION_KEY: ${MIAUW_WHATSAPP_ENCRYPTION_KEY:-}
      MIAUW_WHATSAPP_HASH_SALT: ${MIAUW_WHATSAPP_HASH_SALT:-}
      MIAUW_WHATSAPP_ALLOWED_SENDERS: ${MIAUW_WHATSAPP_ALLOWED_SENDERS:-}
      MIAUW_WHATSAPP_DASHBOARD_USER: ${MIAUW_WHATSAPP_DASHBOARD_USER:-}
      MIAUW_WHATSAPP_DASHBOARD_PASSWORD: ${MIAUW_WHATSAPP_DASHBOARD_PASSWORD:-}
      MIAUW_WHATSAPP_DASHBOARD_SESSION_TTL_MINUTES: ${MIAUW_WHATSAPP_DASHBOARD_SESSION_TTL_MINUTES:-720}
      MIAUW_WHATSAPP_REQUIRE_PREFIX: ${MIAUW_WHATSAPP_REQUIRE_PREFIX:-true}
      MIAUW_WHATSAPP_PREFIX: ${MIAUW_WHATSAPP_PREFIX:-miauby}
      MIAUW_WHATSAPP_GROUPS_ENABLED: ${MIAUW_WHATSAPP_GROUPS_ENABLED:-false}
      MIAUW_WHATSAPP_MAX_REPLIES_PER_INBOUND: ${MIAUW_WHATSAPP_MAX_REPLIES_PER_INBOUND:-1}
      MIAUW_WHATSAPP_USER_RATE_LIMIT_PER_MINUTE: ${MIAUW_WHATSAPP_USER_RATE_LIMIT_PER_MINUTE:-6}
      MIAUW_WHATSAPP_USER_RATE_LIMIT_PER_DAY: ${MIAUW_WHATSAPP_USER_RATE_LIMIT_PER_DAY:-120}
      MIAUW_WHATSAPP_MIN_REPLY_DELAY_MS: ${MIAUW_WHATSAPP_MIN_REPLY_DELAY_MS:-700}
      MIAUW_WHATSAPP_MAX_REPLY_DELAY_MS: ${MIAUW_WHATSAPP_MAX_REPLY_DELAY_MS:-2200}
      MIAUW_WHATSAPP_GLOBAL_RATE_LIMIT_PER_MINUTE: ${MIAUW_WHATSAPP_GLOBAL_RATE_LIMIT_PER_MINUTE:-8}
      MIAUW_WHATSAPP_SEND_MIN_INTERVAL_MS: ${MIAUW_WHATSAPP_SEND_MIN_INTERVAL_MS:-2500}
      MIAUW_WHATSAPP_PROVIDER_PAUSE_ON_ERROR_MS: ${MIAUW_WHATSAPP_PROVIDER_PAUSE_ON_ERROR_MS:-60000}
      MIAUW_WHATSAPP_AI_MODE: ${MIAUW_WHATSAPP_AI_MODE:-miauw}
      MIAUW_WHATSAPP_GEMINI_MODEL: ${MIAUW_WHATSAPP_GEMINI_MODEL:-gemini-2.5-flash}
      MIAUW_WHATSAPP_GEMINI_MAX_OUTPUT_TOKENS: ${MIAUW_WHATSAPP_GEMINI_MAX_OUTPUT_TOKENS:-220}
      MIAUW_WHATSAPP_GEMINI_TEMPERATURE_X100: ${MIAUW_WHATSAPP_GEMINI_TEMPERATURE_X100:-35}
      MIAUW_WHATSAPP_GEMINI_THINKING_BUDGET: ${MIAUW_WHATSAPP_GEMINI_THINKING_BUDGET:-0}
      MIAUW_WHATSAPP_CONTEXT_PACK: ${MIAUW_WHATSAPP_CONTEXT_PACK:-}
      MIAUW_WHATSAPP_REPLY_CACHE_TTL_SECONDS: ${MIAUW_WHATSAPP_REPLY_CACHE_TTL_SECONDS:-90}
      MIAUW_WHATSAPP_RECIPIENT_ALIASES: ${MIAUW_WHATSAPP_RECIPIENT_ALIASES:-}
      MIAUW_WHATSAPP_AGENT_RUN_URL: ${MIAUW_WHATSAPP_AGENT_RUN_URL:-http://wimifarma-miauw-agent:3100/miauw/agent/run}
      MIAUW_WHATSAPP_PROVIDER: ${MIAUW_WHATSAPP_PROVIDER:-evolution}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE_URL: ${GEMINI_API_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      MIAUW_AGENT_INTERNAL_TOKEN: ${MIAUW_AGENT_INTERNAL_TOKEN:-}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_API_INSTANCE: ${EVOLUTION_API_INSTANCE:-wimifarma-cashback-test}
      META_WHATSAPP_ACCESS_TOKEN: ${META_WHATSAPP_ACCESS_TOKEN:-}
      META_WHATSAPP_PHONE_NUMBER_ID: ${META_WHATSAPP_PHONE_NUMBER_ID:-}
      META_WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${META_WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      META_WHATSAPP_APP_SECRET: ${META_WHATSAPP_APP_SECRET:-}
      META_WHATSAPP_GRAPH_API_VERSION: ${META_WHATSAPP_GRAPH_API_VERSION:-v23.0}
    networks:
      - wimifarma-com-network

networks:
  wimifarma-com-network:
    name: wimifarma-com-network
