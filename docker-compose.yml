services:
  wimifarma-com-db:
    image: mysql:8.0
    container_name: wimifarma-com-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wimifarma_dev_root}
      MYSQL_DATABASE: wimifarma_wp
      MYSQL_USER: wimifarma_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
    volumes:
      - ./mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - wimifarma-com-network

  wimifarma-com-web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: wimifarma-com-web
    restart: unless-stopped
    depends_on:
      - wimifarma-com-db
      - wimifarma-cotacao-app
      - wimifarma-gestao-app
      - wimifarma-miauw-agent
    environment:
      WIMIFARMA_DB_HOST: wimifarma-com-db
      WIMIFARMA_DB_USER: wimifarma_user
      WIMIFARMA_DB_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
      WIMIFARMA_WP_DB_NAME: wimifarma_wp
      WIMIFARMA_APP_DB_NAME: wimifarma_app
      WP_CACHE: ${WP_CACHE:-}
      MIAUW_OPENAI_API_KEY: ${MIAUW_OPENAI_API_KEY:-}
      MIAUW_OPENAI_MODEL: ${MIAUW_OPENAI_MODEL:-gpt-5.4-mini}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      MIAUW_AGENT_INTERNAL_TOKEN: ${MIAUW_AGENT_INTERNAL_TOKEN:-}
      MIAUW_AGENT_INTERNAL_BASE_URL: ${MIAUW_AGENT_INTERNAL_BASE_URL:-http://wimifarma-miauw-agent:3100/miauw/agent}
      MIAUW_AGENT_SHADOW_ON_SEND: ${MIAUW_AGENT_SHADOW_ON_SEND:-false}
      MIAUW_AGENT_SHADOW_TIMEOUT_MS: ${MIAUW_AGENT_SHADOW_TIMEOUT_MS:-12000}
      MIAUW_ENGINE: ${MIAUW_ENGINE:-php}
      MIAUW_AGENT_ENGINE_ALLOWED_USERS: ${MIAUW_AGENT_ENGINE_ALLOWED_USERS:-adm}
      MIAUW_MAINTENANCE_MODE: ${MIAUW_MAINTENANCE_MODE:-false}
      MIAUW_MAINTENANCE_ALLOWED_USERS: ${MIAUW_MAINTENANCE_ALLOWED_USERS:-adm}
      MIAUW_MAINTENANCE_MESSAGE: ${MIAUW_MAINTENANCE_MESSAGE:-}
      MIAUW_VOICE_PROFILE: ${MIAUW_VOICE_PROFILE:-miauby_padrao}
      MIAUW_AUDIO_ENABLED: ${MIAUW_AUDIO_ENABLED:-true}
      MIAUW_TRANSCRIPTION_MODEL: ${MIAUW_TRANSCRIPTION_MODEL:-gpt-4o-transcribe}
      MIAUW_SPEECH_MODEL: ${MIAUW_SPEECH_MODEL:-gpt-4o-mini-tts}
      MIAUW_SPEECH_VOICE: ${MIAUW_SPEECH_VOICE:-marin}
      MIAUW_REALTIME_MODEL: ${MIAUW_REALTIME_MODEL:-gpt-realtime}
      MIAUW_REALTIME_VOICE: ${MIAUW_REALTIME_VOICE:-marin}
      COTACAO_INTERNAL_TOKEN: ${COTACAO_INTERNAL_TOKEN:-}
      COTACAO_INTERNAL_BASE_URL: ${COTACAO_INTERNAL_BASE_URL:-http://wimifarma-cotacao-app:3000/cotacao}
      GESTAO_INTERNAL_TOKEN: ${GESTAO_INTERNAL_TOKEN:-}
      GESTAO_INTERNAL_BASE_URL: ${GESTAO_INTERNAL_BASE_URL:-http://wimifarma-gestao-app:3200/gestao}
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./site:/var/www/html
    networks:
      - wimifarma-com-network

  wimifarma-cotacao-db:
    image: postgres:17-alpine
    container_name: wimifarma-cotacao-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wimifarma_cotacao
      POSTGRES_USER: wimifarma_cotacao
      POSTGRES_PASSWORD: ${COTACAO_POSTGRES_PASSWORD:-wimifarma_cotacao_dev_pass}
    volumes:
      - ./cotacao-data/postgres:/var/lib/postgresql/data
    networks:
      - wimifarma-com-network

  wimifarma-cotacao-redis:
    image: redis:7-alpine
    container_name: wimifarma-cotacao-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./cotacao-data/redis:/data
    networks:
      - wimifarma-com-network

  wimifarma-gestao-db:
    image: postgres:17-alpine
    container_name: wimifarma-gestao-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wimifarma_gestao
      POSTGRES_USER: wimifarma_gestao
      POSTGRES_PASSWORD: ${GESTAO_POSTGRES_PASSWORD:-wimifarma_gestao_dev_pass}
    volumes:
      - ./gestao-data/postgres:/var/lib/postgresql/data
    networks:
      - wimifarma-com-network

  wimifarma-gestao-app:
    build:
      context: ./apps/gestao
      dockerfile: Dockerfile
    container_name: wimifarma-gestao-app
    restart: unless-stopped
    depends_on:
      - wimifarma-com-db
      - wimifarma-gestao-db
    environment:
      NODE_ENV: production
      PORT: 3200
      BASE_PATH: /gestao
      MYSQL_HOST: wimifarma-com-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: wimifarma_app
      MYSQL_USER: wimifarma_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
      POSTGRES_HOST: wimifarma-gestao-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wimifarma_gestao
      POSTGRES_USER: wimifarma_gestao
      POSTGRES_PASSWORD: ${GESTAO_POSTGRES_PASSWORD:-wimifarma_gestao_dev_pass}
      GESTAO_SESSION_SECRET: ${GESTAO_SESSION_SECRET:-wimifarma_gestao_dev_secret_change_me}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      GESTAO_INTERNAL_TOKEN: ${GESTAO_INTERNAL_TOKEN:-}
    networks:
      - wimifarma-com-network

  wimifarma-cotacao-app:
    build:
      context: ./apps/cotacao
      dockerfile: Dockerfile
    container_name: wimifarma-cotacao-app
    restart: unless-stopped
    depends_on:
      - wimifarma-com-db
      - wimifarma-cotacao-db
      - wimifarma-cotacao-redis
    environment:
      NODE_ENV: production
      PORT: 3000
      BASE_PATH: /cotacao
      MYSQL_HOST: wimifarma-com-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: wimifarma_app
      MYSQL_USER: wimifarma_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wimifarma_dev_pass}
      POSTGRES_HOST: wimifarma-cotacao-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wimifarma_cotacao
      POSTGRES_USER: wimifarma_cotacao
      POSTGRES_PASSWORD: ${COTACAO_POSTGRES_PASSWORD:-wimifarma_cotacao_dev_pass}
      REDIS_URL: redis://wimifarma-cotacao-redis:6379
      SESSION_SECRET: ${COTACAO_SESSION_SECRET:-wimifarma_cotacao_dev_secret_change_me}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      COTACAO_INTERNAL_TOKEN: ${COTACAO_INTERNAL_TOKEN:-}
      COTACAO_BACKUP_DIR: /app/backups
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID:-}
      GOOGLE_SHEETS_RANGE: ${GOOGLE_SHEETS_RANGE:-Cotacao!A1:Z500}
      GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: ${GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE: ${GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE:-}
    volumes:
      - ./cotacao-data/backups:/app/backups
    networks:
      - wimifarma-com-network

  wimifarma-miauw-agent:
    build:
      context: ./apps/miauw-agent
      dockerfile: Dockerfile
    container_name: wimifarma-miauw-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3100
      MIAUW_AGENT_BASE_PATH: /miauw/agent
      MIAUW_OPENAI_API_KEY: ${MIAUW_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${MIAUW_OPENAI_API_KEY:-}
      MIAUW_OPENAI_MODEL: ${MIAUW_OPENAI_MODEL:-gpt-5.4-mini}
      MIAUW_GUARDIAN_TOKEN: ${MIAUW_GUARDIAN_TOKEN:-}
      MIAUW_AGENT_INTERNAL_TOKEN: ${MIAUW_AGENT_INTERNAL_TOKEN:-}
      MIAUW_PHP_TOOL_BRIDGE_URL: ${MIAUW_PHP_TOOL_BRIDGE_URL:-http://wimifarma-com-web/miauw/agent-tools.php}
      MIAUW_VOICE_PROFILE: ${MIAUW_VOICE_PROFILE:-miauby_padrao}
      MIAUW_AUDIO_ENABLED: ${MIAUW_AUDIO_ENABLED:-true}
      MIAUW_TRANSCRIPTION_MODEL: ${MIAUW_TRANSCRIPTION_MODEL:-gpt-4o-transcribe}
      MIAUW_REALTIME_MODEL: ${MIAUW_REALTIME_MODEL:-gpt-realtime}
      MIAUW_REALTIME_VOICE: ${MIAUW_REALTIME_VOICE:-marin}
    networks:
      - wimifarma-com-network

networks:
  wimifarma-com-network:
    name: wimifarma-com-network
