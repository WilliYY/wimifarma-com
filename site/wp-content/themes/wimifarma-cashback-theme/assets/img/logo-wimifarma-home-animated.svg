<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 400" width="1024" height="400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="wimifarma-logo-title" id="wimifarma-svg-logo">
  <title id="wimifarma-logo-title">Wimifarma</title>
  <style>
    #wimifarma-svg-logo {
      background: transparent;
      color: #ffffff;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }

    #wimifarma-svg-logo * {
      transform-box: fill-box;
      transform-origin: center;
    }

    .logo-shell,
    .logo-divider,
    .logo-word,
    .logo-tm,
    .logo-plus-bar {
      fill: currentColor;
    }

    .logo-plus {
      transform-origin: 136px 200px;
      animation: kinetic-plus 4s cubic-bezier(0.25, 1, 0.5, 1) infinite;
    }

    .logo-shell {
      transform-origin: 512px 200px;
      animation: kinetic-shell 4s cubic-bezier(0.175, 0.885, 0.32, 1.15) infinite;
    }

    .logo-divider {
      transform-origin: 212px 200px;
      animation: kinetic-divider 4s cubic-bezier(0.175, 0.885, 0.32, 1.15) infinite;
    }

    .logo-text {
      transform-origin: 580px 200px;
      animation: kinetic-text 4s cubic-bezier(0.175, 0.885, 0.32, 1.15) infinite;
    }

    @keyframes kinetic-plus {
      0% {
        transform: translateX(377px) scale(0) rotate(0deg);
        opacity: 0;
      }
      25% {
        transform: translateX(377px) scale(1.28) rotate(540deg);
        opacity: 1;
      }
      42% {
        transform: translateX(377px) scale(1.28) rotate(720deg);
        opacity: 1;
      }
      58% {
        transform: translateX(0) scale(1) rotate(1080deg);
        opacity: 1;
      }
      90% {
        transform: translateX(0) scale(1) rotate(1080deg);
        opacity: 1;
      }
      95%, 100% {
        transform: translateX(377px) scale(0) rotate(0deg);
        opacity: 0;
      }
    }

    @keyframes kinetic-shell {
      0%, 42% {
        transform: scaleX(0);
        opacity: 0;
      }
      45% {
        transform: scaleX(0);
        opacity: 1;
      }
      65% {
        transform: scaleX(1.04);
        opacity: 1;
      }
      75% {
        transform: scaleX(0.98);
        opacity: 1;
      }
      85%, 95% {
        transform: scaleX(1);
        opacity: 1;
      }
      96%, 100% {
        transform: scaleX(0);
        opacity: 0;
      }
    }

    @keyframes kinetic-divider {
      0%, 46% {
        transform: scaleY(0);
        opacity: 0;
      }
      58%, 90% {
        transform: scaleY(1);
        opacity: 1;
      }
      95%, 100% {
        transform: scaleY(0);
        opacity: 0;
      }
    }

    @keyframes kinetic-text {
      0%, 48% {
        transform: translateX(-60px);
        opacity: 0;
      }
      65% {
        transform: translateX(10px);
        opacity: 1;
      }
      75% {
        transform: translateX(-3px);
        opacity: 1;
      }
      85%, 90% {
        transform: translateX(0);
        opacity: 1;
      }
      95%, 100% {
        transform: translateX(-60px);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-plus,
      .logo-shell,
      .logo-divider,
      .logo-text {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>

  <path class="logo-shell" fill-rule="evenodd" d="M145 99H879C935.06 99 981 144.94 981 201C981 257.06 935.06 303 879 303H145C88.94 303 43 257.06 43 201C43 144.94 88.94 99 145 99ZM145 125C103.25 125 69 159.25 69 201C69 242.75 103.25 277 145 277H879C920.75 277 955 242.75 955 201C955 159.25 920.75 125 879 125H145Z" />

  <g class="logo-plus" aria-hidden="true">
    <rect class="logo-plus-bar" x="123" y="158" width="26" height="84" rx="10" />
    <rect class="logo-plus-bar" x="94" y="187" width="84" height="26" rx="10" />
  </g>

  <rect class="logo-divider" x="205" y="137" width="10" height="126" rx="5" />

  <g class="logo-text" aria-hidden="true">
    <text class="logo-word" x="244" y="216" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="108" font-weight="850" letter-spacing="0">WimiFarma</text>
    <text class="logo-tm" x="872" y="145" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="25" font-weight="850" letter-spacing="0">TM</text>
  </g>
</svg>
