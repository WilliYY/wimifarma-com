<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 400" width="1024" height="400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="wimifarma-logo-title" id="wimifarma-home-logo">
  <title id="wimifarma-logo-title">Wimifarma</title>
  <style>
    #wimifarma-home-logo {
      background: transparent;
      color: #fff;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }

    #wimifarma-home-logo * {
      transform-box: fill-box;
      transform-origin: center;
      vector-effect: non-scaling-stroke;
    }

    .wf-animated {
      backface-visibility: hidden;
      will-change: transform, opacity;
    }

    .wf-capsule {
      fill: none;
      stroke: currentColor;
      stroke-width: 28;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .wf-plus {
      transform-origin: 158px 200px;
      animation: wf-plus-spin 2.8s cubic-bezier(.45, 0, .2, 1) infinite;
    }

    .wf-plus-bar {
      fill: currentColor;
      rx: 9;
    }

    .wf-divider {
      fill: currentColor;
      transform-origin: 236px 200px;
    }

    .wf-word-group {
      transform-origin: 596px 200px;
    }

    .wf-word {
      fill: currentColor;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 104px;
      font-weight: 850;
      letter-spacing: -2px;
      dominant-baseline: middle;
    }

    .wf-tm {
      fill: currentColor;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 24px;
      font-weight: 850;
      letter-spacing: 1px;
    }

    @keyframes wf-plus-spin {
      0% {
        transform: rotate(0deg) scale(1);
      }
      42% {
        transform: rotate(164deg) scale(1.045);
      }
      58% {
        transform: rotate(214deg) scale(1.045);
      }
      100% {
        transform: rotate(360deg) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .wf-animated {
        animation: none !important;
        transform: none !important;
      }
    }
  </style>
  <g aria-hidden="true">
    <rect class="wf-capsule wf-animated" x="50" y="86" width="924" height="228" rx="114" />
    <g class="wf-plus wf-animated">
      <rect class="wf-plus-bar" x="124" y="188" width="68" height="24" rx="9" />
      <rect class="wf-plus-bar" x="146" y="166" width="24" height="68" rx="9" />
    </g>
    <rect class="wf-divider wf-animated" x="232" y="128" width="8" height="144" rx="4" />
    <g class="wf-word-group wf-animated">
      <text class="wf-word" x="282" y="205">WimiFarma</text>
      <text class="wf-tm" x="850" y="128">TM</text>
    </g>
  </g>
</svg>
