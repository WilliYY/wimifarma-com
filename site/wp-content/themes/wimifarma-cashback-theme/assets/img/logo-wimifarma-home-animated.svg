<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 400" width="1024" height="400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="wimifarma-logo-title" id="wimifarma-home-logo">
  <title id="wimifarma-logo-title">Wimifarma</title>
  <defs>
    <clipPath id="wf-capsule-reveal">
      <rect class="wf-capsule-reveal-rect" x="40" y="72" width="944" height="256" rx="128" />
    </clipPath>
  </defs>
  <style>
    #wimifarma-home-logo {
      background: transparent;
      color: #fff;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }

    #wimifarma-home-logo * {
      transform-box: fill-box;
      transform-origin: center;
      vector-effect: non-scaling-stroke;
    }

    .wf-animated {
      backface-visibility: hidden;
      will-change: transform, opacity;
    }

    .wf-capsule {
      fill: none;
      stroke: currentColor;
      stroke-width: 28;
      stroke-linecap: round;
      stroke-linejoin: round;
      clip-path: url(#wf-capsule-reveal);
      animation: wf-capsule-visible 4s ease-in-out infinite;
    }

    .wf-capsule-reveal-rect {
      transform-origin: 512px 200px;
      animation: wf-capsule-open 4s cubic-bezier(.18, .88, .32, 1.1) infinite;
    }

    .wf-plus {
      transform-origin: 158px 200px;
      animation: wf-plus-spin 4s cubic-bezier(.25, 1, .5, 1) infinite;
    }

    .wf-plus-bar {
      fill: currentColor;
      rx: 9;
    }

    .wf-divider {
      fill: currentColor;
      animation: wf-divider-draw 4s cubic-bezier(.18, .88, .32, 1.1) infinite;
      transform-origin: 236px 200px;
    }

    .wf-word-group {
      animation: wf-word-enter 4s cubic-bezier(.18, .88, .32, 1.1) infinite;
      transform-origin: 596px 200px;
    }

    .wf-word {
      fill: currentColor;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 104px;
      font-weight: 850;
      letter-spacing: -2px;
      dominant-baseline: middle;
    }

    .wf-tm {
      fill: currentColor;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 24px;
      font-weight: 850;
      letter-spacing: 1px;
    }

    @keyframes wf-plus-spin {
      0% {
        opacity: 0;
        transform: translate(354px, 0) scale(.25) rotate(0deg);
      }
      16% {
        opacity: 1;
        transform: translate(354px, 0) scale(1.22) rotate(450deg);
      }
      31% {
        opacity: 1;
        transform: translate(354px, 0) scale(1.22) rotate(720deg);
      }
      47% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(1080deg);
      }
      88% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(1080deg);
      }
      100% {
        opacity: 0;
        transform: translate(354px, 0) scale(.25) rotate(1440deg);
      }
    }

    @keyframes wf-capsule-open {
      0%, 24% {
        transform: scaleX(.06);
      }
      48%, 88% {
        transform: scaleX(1);
      }
      100% {
        transform: scaleX(.06);
      }
    }

    @keyframes wf-capsule-visible {
      0%, 31%, 100% {
        opacity: 0;
      }
      42%, 88% {
        opacity: 1;
      }
    }

    @keyframes wf-divider-draw {
      0%, 41% {
        opacity: 0;
        transform: scaleY(.2);
      }
      52%, 88% {
        opacity: 1;
        transform: scaleY(1);
      }
      100% {
        opacity: 0;
        transform: scaleY(.2);
      }
    }

    @keyframes wf-word-enter {
      0%, 46% {
        opacity: 0;
        transform: translateX(-26px) scale(.97);
      }
      58%, 88% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(-18px) scale(.98);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .wf-animated,
      .wf-capsule-reveal-rect {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
  <g aria-hidden="true">
    <rect class="wf-capsule wf-animated" x="50" y="86" width="924" height="228" rx="114" />
    <g class="wf-plus wf-animated">
      <rect class="wf-plus-bar" x="124" y="188" width="68" height="24" rx="9" />
      <rect class="wf-plus-bar" x="146" y="166" width="24" height="68" rx="9" />
    </g>
    <rect class="wf-divider wf-animated" x="232" y="128" width="8" height="144" rx="4" />
    <g class="wf-word-group wf-animated">
      <text class="wf-word" x="282" y="205">WimiFarma</text>
      <text class="wf-tm" x="850" y="128">TM</text>
    </g>
  </g>
</svg>
