services:
  wimifarma-n8n-db:
    image: postgres:17
    container_name: wimifarma-n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wimifarma_n8n
      POSTGRES_USER: wimifarma_n8n
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:?configure N8N_POSTGRES_PASSWORD}
    volumes:
      - ./n8n-postgres:/var/lib/postgresql/data
    networks:
      - wimifarma-com-network

  wimifarma-n8n:
    image: docker.n8n.io/n8nio/n8n:2.22.4
    container_name: wimifarma-n8n
    restart: unless-stopped
    depends_on:
      - wimifarma-n8n-db
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: wimifarma-n8n-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: wimifarma_n8n
      DB_POSTGRESDB_USER: wimifarma_n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:?configure N8N_POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?configure N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST:-127.0.0.1}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://127.0.0.1:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      TZ: ${TZ:-America/Sao_Paulo}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
    volumes:
      - ./n8n-data:/home/node/.n8n
    networks:
      - wimifarma-com-network

networks:
  wimifarma-com-network:
    external: true
